    adr_dir: /Users/shimomoto_tatsuya/MyAI_Lab/authorship-strategy/docs/adr
    has_ja: true
    glossary_path: /Users/shimomoto_tatsuya/MyAI_Lab/authorship-strategy/docs/glossary.md
    glossary_path_ja: /Users/shimomoto_tatsuya/MyAI_Lab/authorship-strategy/docs/glossary.ja.md
    glossary_parser: section
    thesis_path: /Users/shimomoto_tatsuya/MyAI_Lab/authorship-strategy/docs/thesis.md
    thesis_path_ja: /Users/shimomoto_tatsuya/MyAI_Lab/authorship-strategy/docs/thesis.ja.md
    judgment_prefix:
      en: |
